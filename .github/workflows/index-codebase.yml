name: Index Codebase

on:
  push:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to index'
        required: true
        type: choice
        options: [develop, main]

permissions:
  contents: write

concurrency:
  group: docs-index
  cancel-in-progress: false

jobs:
  index:
    name: Generate context document
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore manifest from docs/index
        env:
          GITHUB_REF_NAME: ${{ inputs.branch || github.ref_name }}
        run: |
          git fetch origin docs/index 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/docs/index; then
            BRANCH_SLUG="${GITHUB_REF_NAME//\//-}"
            mkdir -p docs
            git show origin/docs/index:docs/${BRANCH_SLUG}-manifest.json > docs/${BRANCH_SLUG}-manifest.json 2>/dev/null || true
          fi

      - name: Run indexer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REF_NAME: ${{ inputs.branch || github.ref_name }}
        run: pnpm tsx scripts/index-codebase.ts

      - name: Push docs to docs/index branch
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/docs-generated
          cp -r docs/. /tmp/docs-generated/
          rm -rf docs/

          git fetch origin docs/index 2>/dev/null || true

          if git show-ref --verify --quiet refs/remotes/origin/docs/index; then
            git checkout -B docs/index origin/docs/index
          else
            git checkout --orphan docs/index
            git rm -rf . --quiet 2>/dev/null || true
          fi

          mkdir -p docs
          cp -r /tmp/docs-generated/. docs/

          git add docs/
          git diff --staged --quiet || {
            git commit -m "chore: update codebase index [skip ci]"
            git push origin docs/index
          }
