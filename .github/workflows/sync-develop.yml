name: Sync develop with main

on:
  push:
    branches: [main]

jobs:
  sync:
    name: Open sync PR to develop
    runs-on: ubuntu-latest
    # Only run on direct pushes (hotfixes), not PR merge commits. PRs are set to merge only
    if: github.event.head_commit.message != '' && !startsWith(github.event.head_commit.message, 'Merge pull request')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create sync branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="sync-main-to-develop-$(date +%Y%m%d%H%M%S)"
          git checkout -b $BRANCH origin/develop
          if git merge origin/main; then
            BODY="A direct push to \`main\` has been automatically merged into this branch. Review and merge to keep \`develop\` in sync."
          else
            git add -A
            git commit -m "Merge main into develop (conflicts need resolution)"
            BODY="A direct push to \`main\` introduced conflicts that require manual resolution. Please resolve the conflicts and merge this PR."
          fi

          git push origin $BRANCH

          gh pr create \
            --base develop \
            --head $BRANCH \
            --title "Sync main into develop" \
            --body "$BODY"
