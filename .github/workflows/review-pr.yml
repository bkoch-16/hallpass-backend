name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop, main]

jobs:
  review:
    name: Review with Claude
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: Get context file (generate if missing)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          git show origin/${{ github.base_ref }}:${{ github.base_ref }}-context.md > context.md 2>/dev/null || true
          if [ ! -s context.md ]; then
            echo "No context file found for ${{ github.base_ref }}, generating..."
            GITHUB_REF_NAME=${{ github.base_ref }} pnpm tsx scripts/index-codebase.ts
            mv ${{ github.base_ref }}-context.md context.md
          fi

      - name: Run AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONTEXT_FILE: context.md
          DIFF_FILE: pr.diff
        run: pnpm tsx scripts/review-pr.ts > review.md

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file review.md
