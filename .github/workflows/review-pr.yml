name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

jobs:
  review:
    name: Review with Claude
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_dispatch' && github.actor == 'bkoch-16') || (github.actor != 'github-actions[bot]' && github.event.pull_request.user.login == 'bkoch-16')

    env:
      HUSKY: 0
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout PR head (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ inputs.pr_number }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          RESOLVED_BASE=${BASE_REF:-$(gh pr view $PR_NUMBER --json baseRefName --jq '.baseRefName')}
          git diff -U20 origin/$RESOLVED_BASE...HEAD > pr.diff

      - name: Fetch context doc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          RESOLVED_BASE=${BASE_REF:-$(gh pr view $PR_NUMBER --json baseRefName --jq '.baseRefName')}
          git fetch origin docs/index 2>/dev/null || true
          SLUG=$(echo "$RESOLVED_BASE" | tr '/' '-')
          git show origin/docs/index:"docs/${SLUG}-context.md" > context.md 2>/dev/null || \
            echo "_Context not yet available (indexing runs on push to ${RESOLVED_BASE})._" > context.md


      - name: Run AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONTEXT_FILE: context.md
          DIFF_FILE: pr.diff
        run: pnpm tsx scripts/review-pr.ts > review.md

      - name: Submit PR review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          if grep -qE "^Ship it" review.md; then
            gh pr review $PR_NUMBER --approve --body-file review.md
          elif grep -qE "^Request changes" review.md; then
            gh pr review $PR_NUMBER --request-changes --body-file review.md
          else
            gh pr review $PR_NUMBER --comment --body-file review.md
          fi
