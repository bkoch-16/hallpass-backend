<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — Hallpass</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏫</text></svg>"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .reset-card {
        max-width: 420px;
        margin: 4rem auto;
        padding: 2rem;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      .reset-card h1 {
        font-size: 1.25rem;
        margin-top: 0;
      }
      .reset-card label {
        display: block;
        margin: 1rem 0 0.25rem;
        font-weight: 600;
      }
      .reset-card input {
        width: 100%;
        padding: 0.5rem;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .reset-card button {
        margin-top: 1.5rem;
        width: 100%;
        padding: 0.6rem;
        cursor: pointer;
      }
      .reset-message {
        margin-top: 1rem;
      }
      .reset-message.error {
        color: #b00020;
      }
      .reset-message.success {
        color: #1a7f37;
      }
    </style>
  </head>
  <body>
    <header>
      <span class="header-title">Hallpass — Reset Password</span>
    </header>

    <div class="reset-card">
      <h1>Choose a new password</h1>
      <form id="reset-form">
        <label for="password">New password</label>
        <input
          type="password"
          id="password"
          minlength="8"
          required
          autocomplete="new-password"
        />
        <label for="confirm">Confirm new password</label>
        <input
          type="password"
          id="confirm"
          minlength="8"
          required
          autocomplete="new-password"
        />
        <button type="submit" id="submit-btn">Reset password</button>
      </form>
      <p class="reset-message" id="message"></p>
    </div>

    <script src="config.js"></script>
    <script src="config-helper.js"></script>
    <script>
      const message = document.getElementById("message");
      const form = document.getElementById("reset-form");
      const submitBtn = document.getElementById("submit-btn");

      const token = new URLSearchParams(location.search).get("token");
      const baseUrl = getUserApiBase();

      function show(text, kind) {
        message.textContent = text;
        message.className = "reset-message " + kind;
      }

      if (!token) {
        form.style.display = "none";
        show(
          "This link is missing its reset token. Request a new password reset email and use the link it contains.",
          "error",
        );
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirm").value;
        if (password !== confirm) {
          show("Passwords do not match.", "error");
          return;
        }
        submitBtn.disabled = true;
        show("Resetting…", "");
        try {
          const res = await fetch(baseUrl + "/api/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ newPassword: password, token }),
          });
          if (res.ok) {
            form.style.display = "none";
            show(
              "Password reset. You can now sign in with your new password.",
              "success",
            );
            const link = document.createElement("a");
            link.href = "index.html";
            link.textContent = "Back to the demo";
            message.appendChild(document.createElement("br"));
            message.appendChild(link);
          } else {
            const body = await res.json().catch(() => ({}));
            show(
              body.message ||
                "Reset failed — the link may have expired. Request a new reset email.",
              "error",
            );
            submitBtn.disabled = false;
          }
        } catch {
          show(
            "Could not reach the server. The API may be cold-starting — try again in a few seconds.",
            "error",
          );
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
